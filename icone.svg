<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo circular gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Círculo de fundo -->
  <circle cx="128" cy="128" r="120" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Prancheta/Clipboard -->
  <rect x="70" y="50" width="116" height="150" rx="8" fill="#FFFFFF" opacity="0.95"/>
  <rect x="80" y="60" width="96" height="130" rx="4" fill="#F5F5F5"/>
  
  <!-- Clipe superior -->
  <rect x="108" y="45" width="40" height="15" rx="7" fill="#FFB74D"/>
  <circle cx="128" cy="52" r="6" fill="#FFFFFF"/>
  
  <!-- Linhas da receita -->
  <rect x="90" y="80" width="76" height="4" rx="2" fill="#4CAF50"/>
  <rect x="90" y="95" width="60" height="3" rx="1.5" fill="#9E9E9E"/>
  <rect x="90" y="105" width="70" height="3" rx="1.5" fill="#9E9E9E"/>
  <rect x="90" y="115" width="55" height="3" rx="1.5" fill="#9E9E9E"/>
  
  <!-- Ícone de chef (chapéu) -->
  <path d="M 100 140 Q 100 130 110 130 Q 110 125 115 125 Q 115 120 128 120 Q 128 120 141 120 Q 141 125 146 125 Q 146 130 156 130 Q 156 140 156 140 Z" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
  <rect x="98" y="138" width="60" height="12" rx="2" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
  
  <!-- Cifrão/Dinheiro -->
  <text x="128" y="180" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4CAF50" text-anchor="middle">R$</text>
</svg>
